<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AI Cyber Assistant</title>
    <style>
        body { background: #0a0a0c; color: #00ff9d; font-family: monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #chatArea { width: 80%; height: 300px; border: 1px solid #00ff9d; padding: 10px; overflow-y: scroll; margin-bottom: 10px; }
        input { width: 70%; padding: 10px; background: #1a1a1f; color: white; border: 1px solid #00ff9d; }
        button { padding: 10px 20px; background: #00ff9d; color: black; cursor: pointer; border: none; }
    </style>
</head>
<body>
    <h1>مساعد Gemini السيبراني</h1>
    <div id="chatArea"></div>
    <input type="text" id="userInput" placeholder="اسألني أي شيء...">
    <button onclick="askGemini()">إرسال الأمر</button>

    <script>
        // هذا النظام يطلب المفتاح مرة واحدة فقط ويحفظه في متصفحك
        async function askGemini() {
            let key = localStorage.getItem('gemini_key');
            if (!key) {
                key = prompt("يرجى إدخال مفتاح Gemini API:");
                localStorage.setItem('gemini_key', key);
            }

            const input = document.getElementById('userInput').value;
            const chat = document.getElementById('chatArea');
            chat.innerHTML += `<p>> ${input}</p>`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: input }] }] })
            });

            const data = await response.json();
            const reply = data.candidates[0].content.parts[0].text;
            chat.innerHTML += `<p style="color:white;">Gemini: ${reply}</p>`;
        }
    </script>
</body>
</html>
