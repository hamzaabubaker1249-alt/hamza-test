<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرك بحث آمن</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header>
        <div class="logo">Ahmia Clone</div>
        <!-- زر التثبيت مخفي افتراضياً ويظهر فقط إذا كان المتصفح يدعم PWA -->
        <button id="installBtn" style="display: none;">تثبيت التطبيق</button>
    </header>

    <main>
        <div class="search-container">
            <h1>ابحث في الروابط المخفية بشكل آمن</h1>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="اكتب كلمة البحث هنا (مثال: حيوانات، متاجر، لينكس)...">
                <button id="searchBtn">بحث</button>
            </div>
        </div>

        <div id="resultsContainer" class="results">
            <!-- ستظهر النتائج هنا -->
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        // تسجيل Service Worker لعمل التطبيق
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker Registered'));
        }
    </script>
</body>
</html
