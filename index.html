<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر حمزة</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>متجر حمزة الإلكتروني</h1>
        <div id="cart-info">السلة: <span id="cart-count">0</span> منتجات</div>
    </header>

    <!-- قسم المنتجات -->
    <section class="products-container" id="products-list">
        <!-- لإضافة منتج جديد، انسخ هذا المربع وغير البيانات -->
        <div class="product">
            <img src="https://via.placeholder.com/150" alt="صورة المنتج">
            <h3>اسم المنتج الأول</h3>
            <p>150 د.ل</p>
            <button onclick="addToCart('اسم المنتج الأول', 150)">إضافة للسلة</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/150" alt="صورة المنتج">
            <h3>اسم المنتج الثاني</h3>
            <p>200 د.ل</p>
            <button onclick="addToCart('اسم المنتج الثاني', 200)">إضافة للسلة</button>
        </div>
    </section>

    <!-- قسم إتمام الطلب (الدفع) -->
    <section class="checkout-section">
        <h2>إتمام الطلب</h2>
        <p>الإجمالي: <span id="total-price">0</span> د.ل</p>
        
        <!-- نموذج إرسال الطلب إلى إيميلك -->
        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
            <input type="text" name="اسم_العميل" placeholder="الاسم الكامل" required>
            <input type="email" name="إيميل_العميل" placeholder="البريد الإلكتروني" required>
            <input type="text" name="العنوان" placeholder="عنوان التوصيل" required>
            
            <!-- حقل مخفي يحتوي على تفاصيل الطلب -->
            <input type="hidden" name="تفاصيل_الطلب" id="order-details" value="">
            
            <h3>اختر طريقة الدفع:</h3>
            <select name="طريقة_الدفع" required>
                <option value="بطاقة_مصرفية">بطاقة مصرفية (فيزا/ماستركارد)</option>
                <option value="الدفع_عند_الاستلام">الدفع عند الاستلام</option>
            </select>

            <button type="submit">تأكيد الطلب والدفع</button>
        </form>
    </section>

    <script src="script.js"></script>
</body>
</html>
