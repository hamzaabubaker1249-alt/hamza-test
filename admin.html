<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EthHackDB - لوحة التحكم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--bg:#080c14;--bg2:#0c1220;--bg3:#111827;--card:#151f30;--border:#1c2e4a;--fg:#e2e8f0;--dim:#7a869a;--accent:#f59e0b;--accent2:#f97316;--accent-dim:rgba(245,158,11,.1);--green:#00ff88;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}
input,select,textarea,button{font-family:'Cairo'}

/* ===== شاشة تسجيل الدخول ===== */
.login-screen{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;transition:opacity .5s,visibility .5s}
.login-screen.hide{opacity:0;visibility:hidden;pointer-events:none}
.login-box{width:400px;max-width:90vw;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px 32px;text-align:center}
.login-box .logo{display:flex;align-items:center;justify-content:center;gap:10px;font-size:1.5rem;font-weight:900;margin-bottom:8px}
.login-box .logo-i{width:48px;height:48px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--bg);font-size:1.3rem}
.login-box .logo span{color:var(--accent)}
.login-box p{color:var(--dim);font-size:.85rem;margin-bottom:28px}
.login-box .lock-icon{width:64px;height:64px;background:var(--accent-dim);border:2px solid rgba(245,158,11,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:1.5rem;color:var(--accent)}
.login-input{width:100%;padding:14px 18px;background:var(--bg2);border:2px solid var(--border);border-radius:10px;color:var(--fg);font-size:1rem;text-align:center;letter-spacing:6px;transition:.3s;margin-bottom:16px}
.login-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 20px rgba(245,158,11,.15)}
.login-input::placeholder{letter-spacing:0;color:var(--dim)}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;color:var(--bg);font-size:1rem;font-weight:700;cursor:pointer;transition:.3s}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(245,158,11,.3)}
.login-err{color:var(--red);font-size:.82rem;margin-top:12px;display:none}
.login-err.show{display:block;animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* ===== التخطيط الرئيسي ===== */
.app{display:flex;min-height:100vh;opacity:0;transition:opacity .5s}
.app.show{opacity:1}
.sidebar{width:260px;min-width:260px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.side-logo{padding:20px;display:flex;align-items:center;gap:10px;font-size:1.1rem;font-weight:900;border-bottom:1px solid var(--border)}
.side-logo i{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--bg);font-size:.9rem}
.side-logo span{color:var(--accent)}
.side-nav{flex:1;padding:12px 0}
.side-label{padding:8px 20px;font-size:.68rem;color:var(--dim);letter-spacing:2px;font-weight:700;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;transition:.2s;font-size:.87rem;color:var(--dim);border-right:3px solid transparent}
.nav-item:hover{background:var(--accent-dim);color:var(--fg)}
.nav-item.active{background:var(--accent-dim);border-right-color:var(--accent);color:var(--accent);font-weight:600}
.nav-item i{width:20px;text-align:center;font-size:.85rem}
.nav-item .badge{margin-right:auto;background:var(--accent);color:var(--bg);font-size:.65rem;padding:2px 7px;border-radius:10px;font-weight:700;font-family:'Fira Code'}
.side-footer{padding:16px 20px;border-top:1px solid var(--border)}
.logout-btn{width:100%;padding:10px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:8px;color:var(--red);cursor:pointer;font-size:.85rem;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.logout-btn:hover{background:rgba(239,68,68,.2)}

.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{padding:16px 28px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar h2{font-size:1.2rem;font-weight:700}
.topbar h2 i{color:var(--accent);margin-left:8px}
.topbar-actions{display:flex;align-items:center;gap:12px}
.coins{display:flex;align-items:center;gap:6px;background:var(--accent-dim);border:1px solid rgba(245,158,11,.2);padding:6px 14px;border-radius:20px;font-size:.85rem;color:var(--accent);font-weight:700;font-family:'Fira Code'}
.coins i{font-size:.9rem}
.content{flex:1;padding:28px;overflow-y:auto}

/* ===== البطاقات الإحصائية ===== */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;transition:.3s}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.3)}
.stat-card .sc-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;margin-bottom:12px}
.stat-card .sc-num{font-size:1.8rem;font-weight:900;font-family:'Fira Code';margin-bottom:4px}
.stat-card .sc-label{font-size:.8rem;color:var(--dim)}

/* ===== الجداول والنماذج ===== */
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:24px}
.panel-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-hdr h3{font-size:1rem;font-weight:700}
.panel-hdr h3 i{color:var(--accent);margin-left:8px}
.panel-body{padding:20px}
.btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:.83rem;transition:.2s;display:inline-flex;align-items:center;gap:6px;font-weight:600}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:var(--accent);color:var(--bg)}
.btn-primary:hover{box-shadow:0 4px 15px rgba(245,158,11,.3);transform:translateY(-1px)}
.btn-success{background:rgba(0,255,136,.1);border-color:rgba(0,255,136,.3);color:var(--green)}
.btn-success:hover{background:rgba(0,255,136,.2)}
.btn-danger{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:var(--red)}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-ghost{background:var(--bg3);color:var(--dim)}
.btn-ghost:hover{color:var(--fg);border-color:var(--accent)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.82rem;font-weight:600;margin-bottom:6px;color:var(--dim)}
.form-input{width:100%;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--fg);font-size:.9rem;transition:.3s}
.form-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 15px rgba(245,158,11,.1)}
.form-input::placeholder{color:var(--dim)}
textarea.form-input{min-height:80px;resize:vertical;font-family:'Fira Code',monospace;font-size:.8rem;direction:ltr;text-align:left}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-select{width:100%;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--fg);font-size:.9rem;cursor:pointer}
.form-select:focus{outline:none;border-color:var(--accent)}
.form-select option{background:var(--bg2);color:var(--fg)}

/* ===== جدول الأدوات ===== */
.tools-table{width:100%;border-collapse:collapse}
.tools-table th{padding:12px 16px;text-align:right;font-size:.78rem;font-weight:700;color:var(--dim);border-bottom:1px solid var(--border);background:var(--bg3)}
.tools-table td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:.85rem;vertical-align:middle}
.tools-table tr:hover td{background:rgba(245,158,11,.03)}
.tools-table .tool-n{font-weight:700;display:flex;align-items:center;gap:8px}
.tools-table .os-b{font-size:.58rem;padding:2px 6px;border-radius:4px;font-family:'Fira Code'}
.tools-table .actions{display:flex;gap:6px}
.tools-table .actions button{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.75rem;transition:.2s}
.tools-table .actions button:hover{color:var(--fg);border-color:var(--accent)}
.tools-table .actions button.del:hover{color:var(--red);border-color:var(--red)}

/* ===== المتجر ===== */
.store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.store-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:.3s;position:relative}
.store-card:hover{transform:translateY(-3px);box-shadow:0 12px 35px rgba(0,0,0,.3)}
.store-card.owned{border-color:rgba(0,255,136,.3)}
.store-card.owned::after{content:'مُفعّل';position:absolute;top:12px;left:12px;background:var(--green);color:var(--bg);font-size:.7rem;padding:3px 10px;border-radius:20px;font-weight:700}
.store-card.featured{border-color:rgba(245,158,11,.3)}
.store-card.featured::before{content:'مميز';position:absolute;top:12px;left:12px;background:var(--accent);color:var(--bg);font-size:.7rem;padding:3px 10px;border-radius:20px;font-weight:700;z-index:1}
.store-icon{height:100px;display:flex;align-items:center;justify-content:center;font-size:2.5rem}
.store-info{padding:20px}
.store-info h4{font-size:1.05rem;font-weight:700;margin-bottom:6px}
.store-info p{font-size:.8rem;color:var(--dim);line-height:1.6;margin-bottom:14px;min-height:48px}
.store-price{display:flex;align-items:center;justify-content:space-between}
.store-price .coins-val{display:flex;align-items:center;gap:6px;font-size:1.1rem;font-weight:900;color:var(--accent);font-family:'Fira Code'}
.store-price .coins-val i{font-size:.9rem}

/* ===== الإعدادات ===== */
.settings-section{margin-bottom:28px}
.settings-section h3{font-size:1rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.settings-section h3 i{color:var(--accent)}
.color-row{display:flex;gap:12px;align-items:center;margin-bottom:12px}
.color-input{width:50px;height:40px;border:2px solid var(--border);border-radius:8px;cursor:pointer;background:none;padding:2px}
.color-input::-webkit-color-swatch-wrapper{padding:0}
.color-input::-webkit-color-swatch{border:none;border-radius:5px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.toggle-row:last-child{border:none}
.toggle-label{font-size:.9rem}
.toggle-desc{font-size:.75rem;color:var(--dim);margin-top:2px}
.toggle{width:48px;height:26px;background:var(--border);border-radius:13px;cursor:pointer;position:relative;transition:.3s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';width:20px;height:20px;background:#fff;border-radius:50%;position:absolute;top:3px;right:3px;transition:.3s}
.toggle.on::after{right:25px}

/* ===== مودال ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:.3s}
.modal-overlay.show{opacity:1;visibility:visible}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;width:700px;max-width:95vw;max-height:90vh;overflow-y:auto;transform:scale(.9);transition:.3s}
.modal-overlay.show .modal{transform:scale(1)}
.modal-hdr{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-hdr h3{font-size:1.1rem;font-weight:700}
.modal-close{width:34px;height:34px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.modal-close:hover{color:var(--red);border-color:var(--red)}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-start}

/* ===== توست ===== */
.toast-c{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:500;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:10px;font-size:.85rem;animation:tin .3s ease,tout .3s ease 2.5s forwards;display:flex;align-items:center;gap:8px;box-shadow:0 10px 30px rgba(0,0,0,.4)}
.toast.success{background:rgba(0,255,136,.15);border:1px solid rgba(0,255,136,.3);color:var(--green)}
.toast.error{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:var(--red)}
.toast.info{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:var(--accent)}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(-20px)}}
@keyframes tout{to{opacity:0;transform:translateX(-50%) translateY(-20px)}}

/* ===== النسخ الاحتياطي ===== */
.backup-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.backup-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:24px;text-align:center;transition:.3s}
.backup-card:hover{border-color:var(--accent)}
.backup-card i{font-size:2rem;margin-bottom:12px;display:block}
.backup-card h4{margin-bottom:6px}
.backup-card p{font-size:.8rem;color:var(--dim);margin-bottom:16px}

/* ===== أوامر مضافة ===== */
.cmd-list{max-height:200px;overflow-y:auto}
.cmd-item{display:flex;gap:8px;align-items:center;margin-bottom:8px;padding:8px;background:var(--bg2);border-radius:6px}
.cmd-item input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:6px 10px;color:var(--fg);font-size:.8rem;font-family:'Fira Code';direction:ltr;text-align:left}
.cmd-item .rm-cmd{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--red);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0}
.cmd-item .rm-cmd:hover{background:rgba(239,68,68,.2)}

/* مخفي */
.hidden{display:none!important}

/* ريسبونسف */
@media(max-width:768px){
  .sidebar{display:none}
  .form-row{grid-template-columns:1fr}
  .store-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
  .content{padding:16px}
  .tools-table{font-size:.78rem}
  .tools-table th,.tools-table td{padding:8px 10px}
}
</style>
</head>
<body>

<!-- شاشة تسجيل الدخول -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="lock-icon"><i class="fas fa-lock"></i></div>
    <div class="logo"><div class="logo-i"><i class="fas fa-shield-halved"></i></div>Eth<span>Hack</span>DB</div>
    <p>لوحة التحكم الإدارية — أدخل كلمة المرور للمتابعة</p>
    <input type="password" class="login-input" id="passInput" placeholder="••••••••••" autofocus>
    <button class="login-btn" id="loginBtn"><i class="fas fa-arrow-right-to-bracket"></i> دخول</button>
    <div class="login-err" id="loginErr">كلمة المرور غير صحيحة</div>
  </div>
</div>

<!-- التطبيق الرئيسي -->
<div class="app" id="app">
  <!-- الشريط الجانبي -->
  <aside class="sidebar">
    <div class="side-logo"><i class="fas fa-shield-halved"></i> Eth<span>Hack</span>DB <span style="font-size:.65rem;color:var(--dim);font-weight:400">Admin</span></div>
    <nav class="side-nav">
      <div class="side-label">رئيسي</div>
      <div class="nav-item active" data-page="dashboard"><i class="fas fa-chart-pie"></i> لوحة التحكم</div>
      <div class="nav-item" data-page="tools"><i class="fas fa-wrench"></i> إدارة الأدوات <span class="badge" id="toolBadge">0</span></div>
      <div class="nav-item" data-page="categories"><i class="fas fa-folder-tree"></i> التصنيفات</div>
      <div class="side-label">الموقع</div>
      <div class="nav-item" data-page="appearance"><i class="fas fa-palette"></i> المظهر والألوان</div>
      <div class="nav-item" data-page="settings"><i class="fas fa-gear"></i> إعدادات الموقع</div>
      <div class="nav-item" data-page="code"><i class="fas fa-code"></i> برمجة مخصصة</div>
      <div class="side-label">أخرى</div>
      <div class="nav-item" data-page="store"><i class="fas fa-store"></i> المتجر</div>
      <div class="nav-item" data-page="backup"><i class="fas fa-database"></i> النسخ الاحتياطي</div>
    </nav>
    <div class="side-footer">
      <button class="logout-btn" id="logoutBtn"><i class="fas fa-right-from-bracket"></i> تسجيل الخروج</button>
    </div>
  </aside>

  <!-- المحتوى -->
  <div class="main">
    <div class="topbar">
      <h2 id="pageTitle"><i class="fas fa-chart-pie"></i> لوحة التحكم</h2>
      <div class="topbar-actions">
        <div class="coins"><i class="fas fa-coins"></i> <span id="coinCount">5000</span></div>
      </div>
    </div>
    <div class="content" id="pageContent"></div>
  </div>
</div>

<!-- مودال إضافة/تعديل أداة -->
<div class="modal-overlay" id="toolModal">
  <div class="modal">
    <div class="modal-hdr"><h3 id="modalTitle">إضافة أداة جديدة</h3><button class="modal-close" onclick="closeModal()"><i class="fas fa-xmark"></i></button></div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-row">
        <div class="form-group"><label>اسم الأداة (إنجليزي)</label><input class="form-input" id="fName" placeholder="مثال: Nmap"></div>
        <div class="form-group"><label>نظام التشغيل</label><select class="form-select" id="fOs"><option value="linux">Linux</option><option value="windows">Windows</option><option value="mac">macOS</option><option value="cross">Cross-Platform</option></select></div>
      </div>
      <div class="form-group"><label>الوصف (عربي)</label><input class="form-input" id="fDesc" placeholder="وصف مختصر للأداة"></div>
      <div class="form-row">
        <div class="form-group"><label>التصنيف</label><select class="form-select" id="fCat"></select></div>
        <div class="form-group"><label>الوسوم (مفصولة بفواصل)</label><input class="form-input" id="fTags" placeholder="فحص, شبكة, منافذ"></div>
      </div>
      <div class="form-group">
        <label>الأوامر</label>
        <div id="cmdList" class="cmd-list"></div>
        <button class="btn btn-ghost" onclick="addCmdRow()" style="margin-top:8px"><i class="fas fa-plus"></i> إضافة أمر</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveTool()"><i class="fas fa-save"></i> حفظ</button>
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
    </div>
  </div>
</div>

<div class="toast-c" id="toastC"></div>

<script>
// ===== ثوابت =====
const PASS='5530213225';
const CATS=[
  {id:'recon',name:'جمع المعلومات',icon:'fa-magnifying-glass',color:0},
  {id:'vuln',name:'فحص الثغرات',icon:'fa-bug',color:1},
  {id:'web',name:'اختبار تطبيقات الويب',icon:'fa-globe',color:2},
  {id:'net',name:'تحليل الشبكات',icon:'fa-network-wired',color:3},
  {id:'pass',name:'كسر كلمات المرور',icon:'fa-key',color:4},
  {id:'wireless',name:'الشبكات اللاسلكية',icon:'fa-wifi',color:5},
  {id:'exploit',name:'الاستغلال',icon:'fa-skull-crossbones',color:6},
  {id:'forensics',name:'التحقيق الرقمي',icon:'fa-fingerprint',color:7},

const loginScreen=document.getElementById('loginScreen');
const passInput=document.getElementById('passInput');
const loginBtn=document.getElementById('loginBtn');
const loginErr=document.getElementById('loginErr');
const app=document.getElementById('app');

function doLogin(){
  if(passInput.value===PASS){
    loginScreen.classList.add('hide');
    app.classList.add('show');
    sessionStorage.setItem('admin_auth','1');
    initApp();
  }else{
    loginErr.classList.add('show');
    passInput.value='';
    passInput.focus();
    setTimeout(()=>loginErr.classList.remove('show'),2000);
  }
}
loginBtn.addEventListener('click',doLogin);
passInput.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});

});

// مودال الأداة
function populateCatSelect(){
  const sel=document.getElementById('fCat');
  sel.innerHTML=CATS.map(cat=>`<option value="${cat.id}">${cat.name}</option>`).join('');
}

function openAddTool(){
  populateCatSelect();
  document.getElementById('modalTitle').textContent='إضافة أداة جديدة';
  document.getElementById('editId').value='';
  document.getElementById('fName').value='';
  document.getElementById('fOs').value='linux';
  document.getElementById('fDesc').value='';
  document.getElementById('fTags').value='';
  document.getElementById('cmdList').innerHTML='';
  addCmdRow();addCmdRow();
  document.getElementById('toolModal').classList.add('show');
}

function openEditTool(id){
  const tool=state.tools.find(t=>t.id===id);if(!tool)return;
  populateCatSelect();
  document.getElementById('modalTitle').textContent='تعديل الأداة: '+tool.name;
  document.getElementById('editId').value=id;
  document.getElementById('fName').value=tool.name;
  document.getElementById('fOs').value=tool.os||'linux';
  document.getElementById('fDesc').value=tool.description;
  document.getElementById('fCat').value=tool.category;
  document.getElementById('fTags').value=(tool.tags||[]).join('، ');
  const cl=document.getElementById('cmdList');cl.innerHTML='';
  (tool.commands||[]).forEach(cmd=>addCmdRow(cmd.title,cmd.cmd));
  if(!cl.children.length)addCmdRow();
  document.getElementById('toolModal').classList.add('show');
}

function closeModal(){document.getElementById('toolModal').classList.remove('show')}

function addCmdRow(title='',cmd=''){
  const cl=document.getElementById('cmdList');
  const div=document.createElement('div');div.className='cmd-item';
  div.innerHTML=`<div style="flex:1;display:flex;flex-direction:column;gap:4px"><input placeholder="عنوان الأمر" value="${title}" class="cmd-title"><input placeholder="الأمر" value="${cmd}" class="cmd-val" style="direction:ltr;text-align:left"></div><button class="rm-cmd" onclick="this.parentElement.remove()"><i class="fas fa-xmark"></i></button>`;
  cl.appendChild(div);
}

function saveTool(){
  const name=document.getElementById('fName').value.trim();
  const desc=document.getElementById('fDesc').value.trim();
  if(!name){toast('أدخل اسم الأداة','error');return}
  if(!desc){toast('أدخل وصف الأداة','error');return}
  const cat=document.getElementById('fCat').value;
  const catObj=CATS.find(c=>c.id===cat);
  const os=document.getElementById('fOs').value;
  const tags=document.getElementById('fTags').value.split(/[,،]/).map(t=>t.trim()).filter(Boolean);
  const cmds=[];
  document.querySelectorAll('#cmdList .cmd-item').forEach(item=>{
    const t=item.querySelector('.cmd-title').value.trim();
    const v=item.querySelector('.cmd-val').value.trim();
    if(t&&v)cmds.push({title:t,cmd:v});
  });
  const editId=document.getElementById('editId').value;
  if(editId){
    const idx=state.tools.findIndex(t=>t.id==editId);
    if(idx>-1){state.tools[idx]={...state.tools[idx],name,description:desc,category:cat,catName:catObj?.name,catIcon:catObj?.icon,catColor:catObj?.color,os,tags,commands:cmds};toast('تم تعديل الأداة بنجاح','success')}
  }else{
    const newId=state.tools.length?Math.max(...state.tools.map(t=>t.id||0))+1:1;
    state.tools.push({id:newId,name,description:desc,category:cat,catName:catObj?.name,catIcon:catObj?.icon,catColor:catObj?.color,os,tags,commands:cmds});
    state.coins+=50;
    toast('تمت إضافة الأداة بنجاح +50 عملة','success');
  }
  saveState();closeModal();renderPage();
}

function deleteTool(id){
  const tool=state.tools.find(t=>t.id===id);if(!tool)return;
  // تأكيد مخصص
  const overlay=document.createElement('div');
  overlay.className='modal-overlay show';
  overlay.innerHTML=`<div class="modal" style="width:400px"><div class="modal-hdr"><h3>تأكيد الحذف</h3></div><div class="modal-body" style="text-align:center"><i class="fas fa-triangle-exclamation" style="font-size:2.5rem;color:var(--red);margin-bottom:12px"></i><p>هل أنت متأكد من حذف <strong>${tool.name}</strong>؟</p><p style="font-size:.8rem;color:var(--dim);margin-top:6px">هذا الإجراء لا يمكن التراجع عنه</p></div><div class="modal-footer" style="justify-content:center"><button class="btn btn-danger" id="confirmDel">حذف نهائي</button><button class="btn btn-ghost" id="cancelDel">إلغاء</button></div></div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#confirmDel').addEventListener('click',()=>{state.tools=state.tools.filter(t=>t.id!==id);saveState();overlay.remove();renderPage();toast('تم حذف الأداة','info')});
  overlay.querySelector('#cancelDel').addEventListener('click',()=>overlay.remove());
}

function duplicateTool(id){
  const tool=state.tools.find(t=>t.id===id);if(!tool)return;
  const newId=state.tools.length?Math.max(...state.tools.map(t=>t.id||0))+1:1;
  state.tools.push({...tool,id:newId,name:tool.name+' (نسخة)',commands:[...tool.commands]});
  saveState();renderPage();toast('تم نسخ الأداة','success');
}

      <button class="btn btn-primary" onclick="saveColors()"><i class="fas fa-save"></i> حفظ الألوان</button>
    </div></div>
    <div class="panel"><div class="panel-hdr"><h3><i class="fas fa-eye"></i> معاينة مباشرة</h3></div><div class="panel-body">
      <div id="colorPreview" style="padding:24px;border-radius:8px;border:1px solid var(--border)">
        <div style="display:flex;gap:12px;margin-bottom:16px"><div style="width:60px;height:60px;border-radius:12px" id="pvPrimary"></div><div style="width:60px;height:60px;border-radius:12px" id="pvSecondary"></div><div style="width:60px;height:60px;border-radius:12px" id="pvBg"></div><div style="width:60px;height:60px;border-radius:12px;border:1px solid var(--border)" id="pvCard"></div></div>
        <div id="pvSample" style="padding:16px;border-radius:8px"><span style="font-weight:700;font-size:1.1rem">Nmap</span> <span style="font-size:.7rem;padding:2px 6px;border-radius:4px;margin-right:8px">LINUX</span><p style="font-size:.82rem;margin-top:6px;opacity:.7">أقوى أداة لفحص الشبكات</p><code style="display:block;margin-top:10px;padding:8px;border-radius:6px;font-family:'Fira Code';font-size:.8rem;direction:ltr;text-align:left">nmap -sV --script=vuln target</code></div>
      </div>
    </div></div>`;
  // ربط الأحداث
  ['Primary','Secondary','Bg','Card'].forEach(name=>{
    const inp=document.getElementById('c'+name);
    if(inp)inp.addEventListener('input',updatePreview);
  });
  updatePreview();
}

function updatePreview(){
  const p=document.getElementById('cPrimary').value;
  const s=document.getElementById('cSecondary').value;
  const b=document.getElementById('cBg').value;
  const cd=document.getElementById('cCard').value;
  document.getElementById('cPrimaryV').textContent=p;
  document.getElementById('cSecondaryV').textContent=s;
  document.getElementById('cBgV').textContent=b;
  document.getElementById('cCardV').textContent=cd;
  const pv=document.getElementById('colorPreview');
  pv.style.background=b;
  document.getElementById('pvPrimary').style.background=p;
  document.getElementById('pvSecondary').style.background=s;
  document.getElementById('pvBg').style.background=b;
  document.getElementById('pvCard').style.background=cd;
  const sample=document.getElementById('pvSample');
  sample.style.background=cd;
  sample.querySelector('span').style.color=p;
  sample.querySelector('code').style.background='rgba(0,0,0,.3)';
  sample.querySelector('code').style.color=s;
  sample.querySelector('span:last-child').style.background=p+'22';
  sample.querySelector('span:last-child').style.color=p;
}

function saveColors(){
  state.settings.primaryColor=document.getElementById('cPrimary').value;
  state.settings.secondaryColor=document.getElementById('cSecondary').value;
  state.settings.bgColor=document.getElementById('cBg').value;
  state.settings.cardBg=document.getElementById('cCard').value;
  saveState();toast('تم حفظ الألوان بنجاح','success');
}

// ===== إعدادات الموقع =====
function renderSettings(c){
  const s=state.settings;
  c.innerHTML=`
    <div class="panel"><div class="panel-hdr"><h3><i class="fas fa-gear"></i> الإعدادات العامة</h3></div><div class="panel-body">
      <div class="form-group"><label>اسم الموقع</label><input class="form-input" id="sName" value="${s.siteName}"></div>
      <div class="form-group"><label>وصف الموقع</label><input class="form-input" id="sDesc" value="${s.siteDesc}"></div>
      <div class="form-group"><label>وصف Meta (لمحركات البحث)</label><input class="form-input" id="sMeta" value="${s.metaDesc||''}" placeholder="سيظهر في نتائج جوجل"></div>
      <div class="form-row">
        <div class="form-group"><label>رابط الشعار (Logo URL)</label><input class="form-input" id="sLogo" value="${s.logoUrl||''}" placeholder="https://..."></div>
        <div class="form-group"><label>رابط الأيقونة (Favicon URL)</label><input class="form-input" id="sFav" value="${s.favicon||''}" placeholder="https://..."></div>
      </div>
      <div class="form-group"><label>عدد الأدوات في كل صفحة</label><input class="form-input" type="number" id="sPerPage" value="${s.itemsPerPage}" min="6" max="100"></div>
      <button class="btn btn-primary" onclick="saveSettings()"><i class="fas fa-save"></i> حفظ الإعدادات</button>
    </div></div>
    <div class="panel"><div class="panel-hdr"><h3><i class="fas fa-toggle-on"></i> الميزات</h3></div><div class="panel-body">
      <div class="toggle-row"><div><div class="toggle-label">المساعد الذكي (AI)</div><div class="toggle-desc">عرض زر المساعد الذكي في الموقع</div></div><div class="toggle ${s.showAiAssistant?'on':''}" data-key="showAiAssistant"></div></div>
      <div class="toggle-row"><div><div class="toggle-label">إحصائيات الهيدر</div><div class="toggle-desc">عرض عدد الأدوات والأوامر في الأعلى</div></div><div class="toggle ${s.showStats?'on':''}" data-key="showStats"></div></div>
      <div class="toggle-row"><div><div class="toggle-label">الشريط الجانبي</div><div class="toggle-desc">عرض قائمة التصنيفات الجانبية</div></div><div class="toggle ${s.showSidebar?'on':''}" data-key="showSidebar"></div></div>
    </div></div>`;
  // ربط التغليطات
  c.querySelectorAll('.toggle').forEach(t=>{
    t.addEventListener('click',()=>{
      t.classList.toggle('on');
      state.settings[t.dataset.key]=t.classList.contains('on');
      saveState();toast('تم تحديث الإعداد','success');
    });
  });
}

function saveSettings(){
  state.settings.siteName=document.getElementById('sName').value.trim()||'EthHackDB';
  state.settings.siteDesc=document.getElementById('sDesc').value.trim();
  state.settings.metaDesc=document.getElementById('sMeta').value.trim();
  state.settings.logoUrl=document.getElementById('sLogo').value.trim();
  state.settings.favicon=document.getElementById('sFav').value.trim();
  state.settings.itemsPerPage=parseInt(document.getElementById('sPerPage').value)||18;
  saveState();toast('تم حفظ الإعدادات','success');
}

// ===== برمجة مخصصة =====
function renderCode(c){
  const s=state.settings;
  c.innerHTML=`
    <div class="panel"><div class="panel-hdr"><h3><i class="fas fa-css3-alt"></i> CSS مخصص</h3></div><div class="panel-body">
      <p style="font-size:.82rem;color:var(--dim);margin-bottom:12px">أضف أكواد CSS مخصصة لتعديل مظهر الموقع. هذه الأكواد تُضاف بعد الأنماط الأساسية.</p>
      <textarea class="form-input" id="customCSS" rows="12" placeholder="/* مثال: تغيير حجم العنوان */
.content-title {
  font-size: 2rem !important;
  color: red !important;
}">${s.customCSS||''}</textarea>
      <button class="btn btn-primary" style="margin-top:12px" onclick="saveCode('css')"><i class="fas fa-save"></i> حفظ CSS</button>
    </div></div>
    <div class="panel"><div class="panel-hdr"><h3><i class="fas fa-js"></i> JavaScript مخصص</h3></div><div class="panel-body">
      <p style="font-size:.82rem;color:var(--dim);margin-bottom:12px">أضف أكواد JavaScript مخصصة. تُنفذ بعد تحميل الصفحة بالكامل.</p>
      <textarea class="form-input" id="customJS" rows="12" placeholder="// مثال: رسالة ترحيب
console.log('مرحباً من EthHackDB');
// إضافة عنصر جديد
const banner = document.createElement('div');
banner.textContent = 'مرحباً بك!';
document.body.prepend(banner);">${s.customJS||''}</textarea>
      <button class="btn btn-primary" style="margin-top:12px" onclick="saveCode('js')"><i class="fas fa-save"></i> حفظ JavaScript</button>
    </div></div>
    <div class="panel"><div class="panel-hdr"><h3><i class="fas fa-code"></i> أكواد جاهزة للاستخدام</h3></div><div class="panel-body">
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">
        ${[
          {name:'شريط إعلان أعلى الصفحة',code:'const bar=document.createElement("div");bar.style.cssText="background:linear-gradient(90deg,#f59e0b,#f97316);color:#000;padding:10px;text-align:center;font-weight:700;font-size:.9rem";bar.textContent="مرحباً بكم في EthHackDB — أقوى قاعدة بيانات أدوات الاختراق الأخلاقي";document.body.prepend(bar);'},
          {name:'عداد زوار وهمي',code:'const counter=document.createElement("div");counter.style.cssText="position:fixed;bottom:10px;right:10px;background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);color:#00ff88;padding:6px 14px;border-radius:20px;font-size:.78rem;font-family:monospace";let v=Math.floor(Math.random()*50000)+10000;counter.textContent="الزوار: "+v.toLocaleString();document.body.appendChild(counter);setInterval(()=>{v+=Math.floor(Math.random()*3);counter.textContent="الزوار: "+v.toLocaleString()},5000);'},
          {name:'تأثير النقر بالماوس',code:'document.addEventListener("click",e=>{const d=document.createElement("div");d.style.cssText="position:fixed;left:"+e.clientX+"px;top:"+e.clientY+"px;width:8px;height:8px;background:#00ff88;border-radius:50%;pointer-events:none;z-index:9999";document.body.appendChild(d);d.animate([{transform:"scale(1)",opacity:1},{transform:"scale(3)",opacity:0}],{duration:600}).onfinish=()=>d.remove()});'},
          {name:'خلفية جزيئات متحركة',code:'const canvas=document.createElement("canvas");canvas.style.cssText="position:fixed;inset:0;z-index:-1;pointer-events:none";document.body.prepend(canvas);const ctx=canvas.getContext("2d");let particles=[];function resize(){canvas.width=innerWidth;canvas.height=innerHeight}resize();window.addEventListener("resize",resize);for(let i=0;i<50;i++)particles.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*2+1,dx:(Math.random()-.5)*.5,dy:(Math.random()-.5)*.5});function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle="rgba(0,255,136,0.3)";ctx.fill();p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>canvas.width)p.dx*=-1;if(p.y<0||p.y>canvas.height)p.dy*=-1});requestAnimationFrame(draw)}draw();'},
        ].map(snippet=>`<div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:16px">
          <div style="font-weight:600;font-size:.88rem;margin-bottom:8px">${snippet.name}</div>
          <button class="btn btn-success" style="font-size:.75rem;padding:5px 12px" onclick="applySnippet(this)" data-code="${btoa(unescape(encodeURIComponent(snippet.code)))}"><i class="fas fa-play"></i> تطبيق</button>
        </div>`).join('')}
      </div>
    </div></div>`;
}

function saveCode(type){
  if(type==='css')state.settings.customCSS=document.getElementById('customCSS').value;
  else state.settings.customJS=document.getElementById('customJS').value;
  saveState();toast('تم حفظ الكود','success');
}

function applySnippet(btn){
  const code=decodeURIComponent(escape(atob(btn.dataset.code)));
  try{eval(code);toast('تم تطبيق الكود بنجاح','success')}catch(e){toast('خطأ في الكود: '+e.message,'error')}
}

// ===== المتجر =====
function renderStore(c){
  c.innerHTML=`
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;padding:20px;background:var(--accent-dim);border:1px solid rgba(245,158,11,.2);border-radius:var(--r)">
      <i class="fas fa-coins" style="font-size:2rem;color:var(--accent)"></i>
      <div><div style="font-size:1.3rem;font-weight:900;color:var(--accent);font-family:'Fira Code'">${state.coins.toLocaleString()}</div><div style="font-size:.82rem;color:var(--dim)">رصيدك الحالي — اربح 50 عملة لكل أداة تضيفها</div></div>
      <button class="btn btn-ghost" style="margin-right:auto" onclick="earnCoins()"><i class="fas fa-plus"></i> اربح عملات</button>
    </div>
    <div class="store-grid">
      ${STORE_ITEMS.map(item=>{
        const owned=state.owned.includes(item.id);
        const canBuy=state.coins>=item.price;
        return`<div class="store-card ${owned?'owned':''} ${item.featured?'featured':''}">
          <div class="store-icon" style="background:${item.color}15;color:${item.color}"><i class="fas ${item.icon}"></i></div>
          <div class="store-info">
            <h4>${item.name}</h4>
            <p>${item.desc}</p>
            <div class="store-price">
              <div class="coins-val"><i class="fas fa-coins"></i> ${item.price.toLocaleString()}</div>
              ${owned?'<span style="color:var(--green);font-size:.85rem;font-weight:600"><i class="fas fa-check-circle"></i> مُفعّل</span>'
              :`<button class="btn ${canBuy?'btn-primary':'btn-ghost'}" ${canBuy?`onclick="buyItem('${item.id}',${item.price})"`:'disabled style="opacity:.5;cursor:not-allowed"'}>${canBuy?'شراء':'غير كافي'}</button>`}
            </div>
          </div>
        </div>`}).join('')}
    </div>`;
}

function buyItem(id,price){
  if(state.coins<price){toast('رصيدك غير كافي','error');return}
  if(state.owned.includes(id)){toast('هذه الميزة مفعّلة بالفعل','info');return}
  state.coins-=price;
  state.owned.push(id);
  saveState();renderPage();toast('تم الشراء بنجاح! تفعيل الميزة يتطلب تحديث كود الموقع','success');
}

function earnCoins(){
  state.coins+=200;
  saveState();renderPage();toast('حصلت على 200 عملة مجاناً','success');
}

// ===== النسخ الاحتياطي =====
function renderBackup(c){
  c.innerHTML=`
    <div class="backup-cards">
      <div class="backup-card">
        <i class="fas fa-download" style="color:var(--green)"></i>
        <h4>تصدير الأدوات JSON</h4>
        <p>تحميل جميع الأدوات كملف JSON جاهز للاستخدام في الموقع</p>
        <button class="btn btn-success" onclick="exportJSON()"><i class="fas fa-download"></i> تصدير</button>
      </div>
      <div class="backup-card">
        <i class="fas fa-upload" style="color:var(--blue)"></i>
        <h4>استيراد أدوات JSON</h4>
        <p>استيراد أدوات من ملف JSON لدمجها مع أدواتك الحالية</p>
        <input type="file" id="importFile" accept=".json" style="display:none">
        <button class="btn btn-ghost" onclick="document.getElementById('importFile').click()"><i class="fas fa-upload"></i> استيراد</button>
      </div>
      <div class="backup-card">
        <i class="fas fa-file-export" style="color:var(--purple)"></i>
        <h4>تصدير كل الإعدادات</h4>
        <p>تحميل نسخة كاملة من جميع الإعدادات والمشتريات والعملات</p>
        <button class="btn btn-ghost" onclick="exportAll()"><i class="fas fa-file-export"></i> تصدير الكل</button>
      </div>
      <div class="backup-card">
        <i class="fas fa-file-import" style="color:var(--accent)"></i>
        <h4>استيراد كل الإعدادات</h4>
        <p>استعادة نسخة احتياطية كاملة من الإعدادات</p>
        <input type="file" id="importAllFile" accept=".json" style="display:none">
        <button class="btn btn-ghost" onclick="document.getElementById('importAllFile').click()"><i class="fas fa-file-import"></i> استيراد الكل</button>
      </div>
      <div class="backup-card">
        <i class="fas fa-file-code" style="color:var(--green)"></i>
        <h4>تصدير CSS+JS</h4>
        <p>تحميل ملف يحتوي CSS و JS المخصصين جاهز للصق في الموقع</p>
        <button class="btn btn-success" onclick="exportCode()"><i class="fas fa-file-code"></i> تصدير</button>
      </div>
      <div class="backup-card">
        <i class="fas fa-trash-can" style="color:var(--red)"></i>
        <h4>مسح جميع البيانات</h4>
        <p>حذف كل الأدوات والإعدادات المحفوظة محلياً (لا يمكن التراجع)</p>
        <button class="btn btn-danger" onclick="clearAll()"><i class="fas fa-trash"></i> مسح الكل</button>
      </div>
    </div>`;
  document.getElementById('importFile').addEventListener('change',e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(Array.isArray(data)){
          const newTools=data.map((t,i)=>({id:state.tools.length?Math.max(...state.tools.map(x=>x.id||0))+i+1:i+1,...t}));
          state.tools=[...state.tools,...newTools];
          saveState();renderPage();toast(`تم استيراد ${newTools.length} أداة بنجاح`,'success');
        }else{toast('الملف يجب أن يحتوي مصفوفة JSON','error')}
      }catch(err){toast('خطأ في قراءة الملف: '+err.message,'error')}
    };
    reader.readAsText(file);e.target.value='';
  });
  document.getElementById('importAllFile').addEventListener('change',e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        state={...state,...data};saveState();renderPage();toast('تم استيراد الإعدادات بنجاح — جاري إعادة التحميل','success');
        setTimeout(()=>location.reload(),1000);
      }catch(err){toast('خطأ في قراءة الملف','error')}
    };
    reader.readAsText(file);e.target.value='';
  });
}

function exportJSON(){
  const blob=new Blob([JSON.stringify(state.tools,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='tools.json';a.click();
  toast('تم تصدير الأدوات بنجاح','success');
}

function exportAll(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='admin_backup.json';a.click();
  toast('تم تصدير النسخة الاحتياطية','success');
}

function exportCode(){
  let code='/* === EthHackDB - CSS مخصص === */\n'+(state.settings.customCSS||'/* لا يوجد CSS مخصص */')+'\n\n/* === EthHackDB - ألوان مخصصة === */\n:root {\n  --primary: '+state.settings.primaryColor+';\n  --secondary: '+state.settings.secondaryColor+';\n  --bg: '+state.settings.bgColor+';\n  --card: '+state.settings.cardBg+';\n}\n\n// === EthHackDB - JavaScript مخصص ===\n'+(state.settings.customJS||'// لا يوجد JS مخصص');
  const blob=new Blob([code],{type:'text/plain'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='custom_code.txt';a.click();
  toast('تم تصدير الكود','success');
}

function clearAll(){
  const overlay=document.createElement('div');
  overlay.className='modal-overlay show';
  overlay.innerHTML=`<div class="modal" style="width:420px"><div class="modal-hdr"><h3 style="color:var(--red)"><i class="fas fa-triangle-exclamation"></i> تأكيد المسح</h3></div><div class="modal-body" style="text-align:center"><p>سيتم حذف <strong>كل شيء</strong>: الأدوات، الإعدادات، المشتريات، والعملات.</p><p style="color:var(--red);font-size:.85rem;margin-top:8px">هذا الإجراء نهائي ولا يمكن التراجع عنه!</p></div><div class="modal-footer" style="justify-content:center"><button class="btn btn-danger" id="confirmClear">مسح نهائي</button><button class="btn btn-ghost" id="cancelClear">إلغاء</button></div></div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#confirmClear').addEventListener('click',()=>{
    localStorage.removeItem('admin_state');
    overlay.remove();location.reload();
  });
  overlay.querySelector('#cancelClear').addEventListener('click',()=>overlay.remove());
}

// ===== توست =====
function toast(msg,type='info'){
  const t=document.createElement('div');t.className='toast '+type;
  const icons={success:'fa-check-circle',error:'fa-times-circle',info:'fa-info-circle'};
  t.innerHTML=`<i class="fas ${icons[type]||icons.info}"></i> ${msg}`;
  document.getElementById('toastC').appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

// ===== تهيئة =====
function initApp(){renderPage()}
</script>
</body>
</html>
